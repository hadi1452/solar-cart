<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar Cart - Admin Dashboard</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --orange:#e87a1e; --navy:#0c1a32; --card:#0e1b30; --border:rgba(255,255,255,0.06); --text:#e2e8f0; --dim:#8892a4; --green:#2ecc71; --red:#ef4444; --yellow:#f59e0b; --blue:#3b82f6; }
        * { margin:0; padding:0; box-sizing:border-box; }
        html, body { font-family:'Inter',sans-serif; background:#060d1a; color:var(--text); min-height:100vh; overflow-x:hidden; width:100%; }

        /* Login */
        .login-screen { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px; }
        .login-box { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:40px; max-width:400px; width:100%; text-align:center; }
        .login-box img { height:50px; margin:0 auto 20px; }
        .login-box h2 { font-size:1.3rem; margin-bottom:8px; }
        .login-box p { font-size:0.85rem; color:var(--dim); margin-bottom:24px; }
        .login-box input { width:100%; padding:12px 16px; background:var(--navy); border:1px solid var(--border); border-radius:10px; color:var(--text); font-size:0.9rem; font-family:inherit; margin-bottom:14px; }
        .login-box input:focus { outline:none; border-color:var(--orange); }
        .login-box button { width:100%; padding:12px; background:var(--orange); color:#fff; border:none; border-radius:10px; font-size:0.9rem; font-weight:600; cursor:pointer; font-family:inherit; }
        .login-box button:hover { background:#d06810; }
        .login-error { color:var(--red); font-size:0.8rem; margin-bottom:10px; display:none; }

        /* Dashboard */
        .dashboard { display:none; }
        .dash-header { background:var(--card); border-bottom:1px solid var(--border); padding:16px 24px; display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:10; }
        .dash-header img { height:35px; }
        .dash-header-right { display:flex; align-items:center; gap:14px; }
        .dash-header-right span { font-size:0.82rem; color:var(--dim); }
        .logout-btn { background:none; border:1px solid var(--border); color:var(--dim); padding:6px 16px; border-radius:8px; font-size:0.8rem; cursor:pointer; font-family:inherit; }
        .logout-btn:hover { border-color:var(--red); color:var(--red); }

        .dash-content { max-width:1000px; margin:0 auto; padding:30px 20px; }

        /* Stats */
        .dash-stats { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:30px; }
        .dash-stat { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:20px; }
        .dash-stat-label { font-size:0.75rem; color:var(--dim); text-transform:uppercase; letter-spacing:1px; margin-bottom:6px; }
        .dash-stat-value { font-size:1.8rem; font-weight:800; }
        .dash-stat-value.orange { color:var(--orange); }
        .dash-stat-value.green { color:var(--green); }
        .dash-stat-value.blue { color:var(--blue); }
        .dash-stat-value.yellow { color:var(--yellow); }

        /* Orders */
        .orders-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
        .orders-header h2 { font-size:1.2rem; }
        .refresh-btn { background:var(--orange); color:#fff; border:none; padding:8px 18px; border-radius:8px; font-size:0.8rem; font-weight:600; cursor:pointer; font-family:inherit; }
        .refresh-btn:hover { background:#d06810; }

        .order-card { background:var(--card); border:1px solid var(--border); border-radius:12px; margin-bottom:14px; overflow:hidden; }
        .order-top { display:flex; justify-content:space-between; align-items:center; padding:16px 20px; cursor:pointer; }
        .order-top:hover { background:rgba(255,255,255,0.02); }
        .order-id { font-weight:700; font-size:0.9rem; }
        .order-meta { display:flex; gap:16px; align-items:center; }
        .order-time { font-size:0.78rem; color:var(--dim); }
        .order-amount { font-weight:700; color:var(--orange); font-size:0.9rem; }
        .order-status { padding:4px 12px; border-radius:50px; font-size:0.7rem; font-weight:600; text-transform:uppercase; }
        .status-new { background:rgba(59,130,246,0.15); color:var(--blue); }
        .status-confirmed { background:rgba(245,158,11,0.15); color:var(--yellow); }
        .status-shipped { background:rgba(232,122,30,0.15); color:var(--orange); }
        .status-delivered { background:rgba(46,204,113,0.15); color:var(--green); }

        .order-detail { display:none; padding:0 20px 20px; border-top:1px solid var(--border); }
        .order-detail.open { display:block; padding-top:16px; }
        .detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:16px; }
        .detail-item label { display:block; font-size:0.7rem; color:var(--dim); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:3px; }
        .detail-item span { font-size:0.88rem; }
        .order-products { margin-bottom:16px; }
        .order-products h4 { font-size:0.82rem; color:var(--dim); margin-bottom:8px; text-transform:uppercase; letter-spacing:0.5px; }
        .order-product-item { display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px solid var(--border); font-size:0.85rem; }
        .order-product-item:last-child { border-bottom:none; }
        .status-buttons { display:flex; gap:8px; flex-wrap:wrap; }
        .status-btn { padding:6px 14px; border-radius:6px; border:1px solid var(--border); background:none; color:var(--dim); font-size:0.75rem; cursor:pointer; font-family:inherit; font-weight:600; }
        .status-btn:hover { border-color:var(--orange); color:var(--orange); }
        .status-btn.active { background:var(--orange); border-color:var(--orange); color:#fff; }

        .no-orders { text-align:center; padding:60px 20px; color:var(--dim); }
        .no-orders h3 { margin-bottom:8px; color:var(--text); }

        /* Tabs */
        .dash-tabs { display:flex; gap:8px; margin-bottom:24px; }
        .dash-tab { padding:10px 24px; border-radius:8px; border:1px solid var(--border); background:none; color:var(--dim); font-size:0.85rem; font-weight:600; cursor:pointer; font-family:inherit; }
        .dash-tab:hover { border-color:var(--orange); color:var(--orange); }
        .dash-tab.active { background:var(--orange); border-color:var(--orange); color:#fff; }
        .tab-content { display:none; }
        .tab-content.active { display:block; }

        /* Social Media Dashboard */
        .social-controls { display:flex; gap:12px; margin-bottom:24px; flex-wrap:wrap; align-items:center; }
        .social-controls select { padding:10px 16px; border-radius:10px; border:1px solid var(--border); background:var(--navy); color:var(--text); font-size:0.85rem; cursor:pointer; font-family:inherit; }
        .social-posts-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(320px, 1fr)); gap:16px; }
        .social-post-card { background:var(--card); border:1px solid var(--border); border-radius:12px; overflow:hidden; }
        .social-post-card .post-img { width:100%; height:180px; overflow:hidden; }
        .social-post-card .post-img img { width:100%; height:100%; object-fit:cover; }
        .social-post-card .post-body { padding:14px; }
        .social-post-card .post-platform { font-size:0.7rem; text-transform:uppercase; letter-spacing:1px; color:var(--orange); font-weight:700; margin-bottom:6px; }
        .social-post-card .post-caption { color:var(--dim); font-size:0.82rem; line-height:1.6; white-space:pre-wrap; margin-bottom:10px; max-height:180px; overflow-y:auto; }
        .social-post-card .post-actions { display:flex; gap:8px; }
        .social-post-card .post-actions button { flex:1; padding:8px; border:none; border-radius:6px; cursor:pointer; font-size:0.78rem; font-weight:600; font-family:inherit; }
        .btn-copy { background:var(--orange); color:#fff; }
        .btn-copy:hover { background:#d06810; }
        .btn-copy.copied { background:var(--green); }
        .btn-whatsapp-share { background:#25d366; color:#fff; }
        .btn-whatsapp-share:hover { background:#1da851; }
        .btn-insta-share { background:linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); color:#fff; }
        .btn-insta-share:hover { opacity:0.9; }
        .btn-fb-share { background:#1877f2; color:#fff; }
        .btn-fb-share:hover { background:#1565c0; }
        .btn-share { background:var(--navy); color:var(--dim); border:1px solid var(--border) !important; }
        .btn-share:hover { color:var(--orange); border-color:var(--orange) !important; }

        /* Notification sound indicator */
        .notif-indicator { display:flex; align-items:center; gap:6px; font-size:0.78rem; color:var(--green); }
        .notif-dot { width:8px; height:8px; background:var(--green); border-radius:50%; animation:pulse-notif 2s infinite; }
        @keyframes pulse-notif { 0%,100%{opacity:1;} 50%{opacity:0.3;} }

        @media(max-width:768px) {
            .dash-stats { grid-template-columns:1fr 1fr; gap:10px; }
            .dash-stat { padding:14px; }
            .dash-stat-value { font-size:1.4rem; }
            .detail-grid { grid-template-columns:1fr; }
            .order-meta { flex-wrap:wrap; gap:8px; }
            .order-top { flex-direction:column; align-items:flex-start; gap:10px; }
            .dash-header { flex-direction:column; gap:10px; padding:12px 16px; }
            .dash-header-right { width:100%; justify-content:space-between; }
            .dash-content { padding:16px 12px; }
            .orders-header { flex-direction:column; gap:10px; align-items:flex-start; }
            .login-box { padding:24px 20px; margin:10px; }
            .login-box h2 { font-size:1.1rem; }
            .status-buttons { flex-wrap:wrap; }
            .status-btn { padding:6px 10px; font-size:0.7rem; }
        }
        @media(max-width:480px) {
            .dash-stats { grid-template-columns:1fr 1fr; gap:8px; }
            .dash-stat { padding:12px 10px; }
            .dash-stat-label { font-size:0.65rem; }
            .dash-stat-value { font-size:1.2rem; }
            .order-id { font-size:0.82rem; }
            .order-amount { font-size:0.82rem; }
            .order-card { margin-bottom:10px; }
            .order-detail.open { padding:12px 14px 14px; }
            .bento-content h3 { font-size:1rem; }
        }
    </style>
</head>
<body>

    <!-- Login Screen -->
    <div class="login-screen" id="loginScreen">
        <div class="login-box">
            <img src="logo.png" alt="Solar Cart">
            <h2>Admin Dashboard</h2>
            <p>Enter password to access orders</p>
            <div class="login-error" id="loginError">Wrong password. Try again.</div>
            <input type="password" id="adminPassword" placeholder="Enter admin password" onkeydown="if(event.key==='Enter')adminLogin()">
            <label style="display:flex;align-items:center;gap:6px;font-size:0.8rem;color:var(--dim);margin-bottom:14px;cursor:pointer;justify-content:flex-start;">
                <input type="checkbox" onchange="document.getElementById('adminPassword').type=this.checked?'text':'password'" style="width:auto;margin:0;"> Show Password
            </label>
            <button onclick="adminLogin()">Login</button>
        </div>
    </div>

    <!-- Dashboard -->
    <div class="dashboard" id="dashboard">
        <div class="dash-header">
            <img src="logo.png" alt="Solar Cart">
            <div class="dash-header-right">
                <div class="notif-indicator">
                    <span class="notif-dot"></span> Live
                </div>
                <span id="lastRefresh"></span>
                <button class="logout-btn" onclick="adminLogout()">Logout</button>
            </div>
        </div>
        <div class="dash-content">
            <!-- Tabs -->
            <div class="dash-tabs">
                <button class="dash-tab active" onclick="switchTab('orders', this)">Orders</button>
                <button class="dash-tab" onclick="switchTab('social', this)">Social Media</button>
            </div>

            <!-- Orders Tab -->
            <div class="tab-content active" id="tab-orders">
                <div class="dash-stats">
                    <div class="dash-stat">
                        <div class="dash-stat-label">Total Orders</div>
                        <div class="dash-stat-value orange" id="statTotal">0</div>
                    </div>
                    <div class="dash-stat">
                        <div class="dash-stat-label">New Orders</div>
                        <div class="dash-stat-value blue" id="statNew">0</div>
                    </div>
                    <div class="dash-stat">
                        <div class="dash-stat-label">Confirmed</div>
                        <div class="dash-stat-value yellow" id="statConfirmed">0</div>
                    </div>
                    <div class="dash-stat">
                        <div class="dash-stat-label">Delivered</div>
                        <div class="dash-stat-value green" id="statDelivered">0</div>
                    </div>
                </div>
                <div class="orders-header">
                    <h2>Orders</h2>
                    <button class="refresh-btn" onclick="loadOrders()">Refresh</button>
                </div>
                <div id="ordersList">
                    <div class="no-orders">
                        <h3>No orders yet</h3>
                        <p>Orders will appear here when customers place them</p>
                    </div>
                </div>
            </div>

            <!-- Social Media Tab -->
            <div class="tab-content" id="tab-social">
                <h2 style="margin-bottom:20px;">Social Media Post Generator</h2>
                <div class="social-controls">
                    <select id="socialPlatform" onchange="generateSocialPosts()">
                        <option value="instagram">Instagram</option>
                        <option value="facebook">Facebook</option>
                        <option value="whatsapp">WhatsApp</option>
                    </select>
                    <select id="socialCategory" onchange="generateSocialPosts()">
                        <option value="all">All Products</option>
                        <option value="longi">Longi Panels</option>
                        <option value="jinko">Jinko Panels</option>
                        <option value="inverter">Inverters</option>
                        <option value="battery">Batteries</option>
                        <option value="ess">ESS Solution</option>
                    </select>
                    <button class="refresh-btn" onclick="generateSocialPosts()">Generate</button>
                </div>
                <div id="socialPosts" class="social-posts-grid"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        const ADMIN_PASSWORD = 'solarcart2026';
        const BLOB_ID = '019ee599-7990-7f2c-ac68-f9eb2bf47601';
        const BLOB_URL = 'https://jsonblob.com/api/jsonBlob/' + BLOB_ID;

        // Login
        function adminLogin() {
            const pw = document.getElementById('adminPassword').value;
            if (pw === ADMIN_PASSWORD) {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                sessionStorage.setItem('admin_logged', 'true');
                loadOrders();
                startLiveListener();
            } else {
                document.getElementById('loginError').style.display = 'block';
            }
        }

        function adminLogout() {
            sessionStorage.removeItem('admin_logged');
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('adminPassword').value = '';
        }

        // Check if already logged in
        if (sessionStorage.getItem('admin_logged') === 'true') {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            loadOrders();
            startLiveListener();
        }

        // Load orders from cloud storage
        function loadOrders() {
            document.getElementById('lastRefresh').textContent = 'Updated: ' + new Date().toLocaleTimeString();

            fetch(BLOB_URL)
                .then(r => r.json())
                .then(data => {
                    const orders = (data.orders || []).map(order => {
                        const saved = getSavedStatus(order.orderId);
                        if (saved) order.status = saved;
                        return order;
                    });
                    renderOrders(orders);
                })
                .catch(err => {
                    console.log('Fetch error:', err);
                });
        }

        function getSavedStatus(orderId) {
            const statuses = JSON.parse(localStorage.getItem('order_statuses') || '{}');
            return statuses[orderId] || null;
        }

        function saveStatus(orderId, status) {
            const statuses = JSON.parse(localStorage.getItem('order_statuses') || '{}');
            statuses[orderId] = status;
            localStorage.setItem('order_statuses', JSON.stringify(statuses));
        }

        function renderOrders(orders) {
            const container = document.getElementById('ordersList');

            if (orders.length === 0) {
                container.innerHTML = '<div class="no-orders"><h3>No orders yet</h3><p>Orders will appear here when customers place them</p></div>';
                updateStats(orders);
                return;
            }

            let html = '';
            orders.forEach((order, i) => {
                const status = order.status || 'new';
                const date = new Date(order.timestamp);
                const timeStr = date.toLocaleDateString('en-PK') + ' ' + date.toLocaleTimeString('en-PK', {hour:'2-digit',minute:'2-digit'});

                let productsHTML = '';
                if (order.products) {
                    order.products.forEach(p => {
                        productsHTML += `<div class="order-product-item"><span>${p.name} x${p.qty}</span><span>Rs. ${p.total}</span></div>`;
                    });
                }

                html += `
                    <div class="order-card">
                        <div class="order-top" onclick="toggleOrder(${i})">
                            <span class="order-id">${order.orderId}</span>
                            <div class="order-meta">
                                <span class="order-time">${timeStr}</span>
                                <span class="order-amount">Rs. ${order.total || '0'}</span>
                                <span class="order-status status-${status}">${status}</span>
                            </div>
                        </div>
                        <div class="order-detail" id="order-${i}">
                            <div class="detail-grid">
                                <div class="detail-item"><label>Customer</label><span>${order.name || '-'}</span></div>
                                <div class="detail-item"><label>Phone</label><span>${order.phone || '-'}</span></div>
                                <div class="detail-item"><label>City</label><span>${order.city || '-'}</span></div>
                                <div class="detail-item"><label>Payment</label><span>${order.payment || '-'}</span></div>
                            </div>
                            <div class="detail-item" style="margin-bottom:16px;"><label>Address</label><span>${order.address || '-'}</span></div>
                            ${order.notes ? `<div class="detail-item" style="margin-bottom:16px;"><label>Notes</label><span>${order.notes}</span></div>` : ''}
                            <div class="order-products">
                                <h4>Products</h4>
                                ${productsHTML}
                            </div>
                            <div class="status-buttons">
                                <span style="font-size:0.75rem;color:var(--dim);margin-right:8px;">Update Status:</span>
                                ${['new','confirmed','shipped','delivered'].map(s =>
                                    `<button class="status-btn ${status===s?'active':''}" onclick="updateStatus('${order.orderId}', '${s}', this)">${s}</button>`
                                ).join('')}
                            </div>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
            updateStats(orders);
        }

        function updateStats(orders) {
            document.getElementById('statTotal').textContent = orders.length;
            document.getElementById('statNew').textContent = orders.filter(o => (o.status||'new') === 'new').length;
            document.getElementById('statConfirmed').textContent = orders.filter(o => o.status === 'confirmed').length;
            document.getElementById('statDelivered').textContent = orders.filter(o => o.status === 'delivered').length;
        }

        function toggleOrder(index) {
            document.getElementById('order-' + index).classList.toggle('open');
        }

        function updateStatus(orderId, status, btn) {
            saveStatus(orderId, status);
            btn.parentElement.querySelectorAll('.status-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const card = btn.closest('.order-card');
            const badge = card.querySelector('.order-status');
            badge.className = 'order-status status-' + status;
            badge.textContent = status;
            loadOrders();
        }

        // Tab switching
        function switchTab(tab, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.dash-tab').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            btn.classList.add('active');
            if (tab === 'social') generateSocialPosts();
        }

        // Live listener - check for new orders every 30 seconds
        let lastOrderCount = 0;
        function startLiveListener() {
            setInterval(() => {
                fetch(BLOB_URL)
                    .then(r => r.json())
                    .then(data => {
                        const count = (data.orders || []).length;
                        if (count > lastOrderCount && lastOrderCount > 0) {
                            if (Notification.permission === 'granted') {
                                new Notification('Solar Cart - New Order!', { body: 'A new order has been placed.', icon: 'logo.png' });
                            }
                            loadOrders();
                        }
                        lastOrderCount = count;
                    }).catch(()=>{});
            }, 30000);

            // Request browser notification permission
            if ('Notification' in window && Notification.permission === 'default') {
                Notification.requestPermission();
            }
        }
    </script>
</body>
</html>
